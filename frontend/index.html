<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        .hidden { display: none; }
        .task { margin: 10px 0; padding: 10px; border: 1px solid #ddd; }
        .completed { opacity: 0.6; text-decoration: line-through; }
        .alert { padding: 10px; margin: 10px 0; }
        .alert-danger { background: #ffdddd; color: #ff0000; }
        .alert-success { background: #ddffdd; color: #00aa00; }
    </style>
</head>
<body>
    <div id="authSection">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <h2>Register</h2>
        <form id="registerForm">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
    </div>

    <div id="tasksSection" class="hidden">
        <h2>Task Manager <span id="usernameDisplay"></span></h2>
        <button id="logoutButton">Logout</button>
        
        <div>
            <input type="text" id="taskInput" placeholder="Enter new task">
            <button id="addButton">Add Task</button>
        </div>
        
        <div id="taskList"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
